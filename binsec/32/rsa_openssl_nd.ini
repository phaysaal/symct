@[@[<rsa_d>, 4], 0x100] := secret as rsa_dd
@[@[<rsa_p>, 4], 0x80] := secret as rsa_pp
@[@[<rsa_q>, 4], 0x80] := secret as rsa_qq
@[@[<rsa_dmp1>, 4], 0x80] := secret as rsa_dmp11
@[@[<rsa_dmq1>, 4], 0x80] := secret as rsa_dmq11
@[@[<rsa_iqmp>, 4], 0x80] := secret as rsa_iqmpp	
@[@[<rsa_n>, 4], 0x100] := nondet	
@[@[<rsa_e>, 4], 0x3] := nondet	

hook <RSA_private_decrypt>(_, dec_in, _) with
	@[dec_in, 0x20] := nondet
end

hook <RSA_sign>(_, sign_in, _, _, _, _) with
	@[sign_in, 0x20] := nondet
end
