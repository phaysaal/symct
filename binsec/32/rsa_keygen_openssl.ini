replace <custom_rand_bytes>(rnd_buf, rnd_num) by
        
	for i<32> in 0 to rnd_num-1 do
		@[rnd_buf+i, 1] := secret
	end
        return 1
        
end

replace <BN_generate_prime_ex>(pgen_bn_ret, pgen_int_bits, pgen_int_safe, pgen_bnp_add, pgen_bnp_rem, pgen_bnp_cb) by
        call_macro mk_safe(pgen_bn_ret)
        new_buf<2056> := secret
        new_buf := new_buf | (3 lsl (uext2056 pgen_int_bits-2)) | 1
        
        assume (new_buf > (1 lsl (uext2056 (pgen_int_bits-1)))) && (new_buf < (1 lsl (uext2056 pgen_int_bits)))

        prm_tmp<512> := secret
        less_than_buf<2056> := uext2056 prm_tmp
        less_than_buf := less_than_buf + 1
        
        assume 1 < less_than_buf && less_than_buf < new_buf
        assume new_buf % less_than_buf <> 0

        pushBV new_buf
        popBN pgen_bn_ret
        return 1
        
end
