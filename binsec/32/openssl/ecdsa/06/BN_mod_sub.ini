# BN_mod_sub - Modular subtraction (compact version)
# Computes: r = (a - b) mod m
# Note: This handles negative results by adding m when needed

replace <BN_mod_sub>(modsub_r, modsub_a, modsub_b, modsub_m, _) by
	# Compute: (a - b) mod m
	# First reduce both operands
	pushBN modsub_a
	pushBN modsub_m
	modUBN

	pushBN modsub_b
	pushBN modsub_m
	modUBN

	# Subtract: a - b (may be negative)
	subBN

	# Add m to handle potential negative result: (a - b) + m
	pushBN modsub_m
	addBN

	# Final reduction mod m to get result in [0, m-1]
	pushBN modsub_m
	modUBN

	# Store result
	popBN modsub_r

	return 1
end
