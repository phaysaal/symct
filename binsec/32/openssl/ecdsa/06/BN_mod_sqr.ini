# BN_mod_sqr - Modular squaring (compact version)
# Computes: r = (a^2) mod m

replace <BN_mod_sqr>(modsqr_r, modsqr_a, modsqr_m, _) by
	# Reduce a mod m
	pushBN modsqr_a
	pushBN modsqr_m
	modUBN

	# Duplicate for squaring: a * a
	pushBN modsqr_a  # Push again (stack now has a, a)
	pushBN modsqr_m
	modUBN

	# Multiply
	mulBN

	# Reduce result mod m
	pushBN modsqr_m
	modUBN

	# Store result
	popBN modsqr_r

	return 1
end
