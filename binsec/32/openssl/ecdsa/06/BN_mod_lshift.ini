# BN_mod_lshift - Modular left shift (compact version)
# Computes: r = (a << n) mod m

replace <BN_mod_lshift>(modlshift_r, modlshift_a, modlshift_n, modlshift_m, _) by
	# For small shifts, use direct approach
	# Reduce a mod m first
	pushBN modlshift_a
	pushBN modlshift_m
	modUBN
	popBV modlshift_a_reduced<2056>

	# Left shift
	modlshift_n_bv<2056> := uext2056 modlshift_n
	modlshift_shifted<2056> := modlshift_a_reduced lsl modlshift_n_bv

	# Reduce result mod m
	pushBV modlshift_shifted
	pushBN modlshift_m
	modUBN

	# Store result
	popBN modlshift_r

	return 1
end

replace <BN_mod_lshift1>(modlshift1_r, modlshift1_a, modlshift1_m, _) by
	# Special case: left shift by 1 bit
	# r = (a * 2) mod m

	# Reduce a mod m
	pushBN modlshift1_a
	pushBN modlshift1_m
	modUBN

	# Duplicate for adding (shift left by 1 = multiply by 2 = add to itself)
	pushBN modlshift1_a
	pushBN modlshift1_m
	modUBN

	# Add: a + a = 2*a
	addBN

	# Reduce mod m
	pushBN modlshift1_m
	modUBN

	# Store result
	popBN modlshift1_r

	return 1
end
