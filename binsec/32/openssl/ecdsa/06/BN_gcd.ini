# BN_gcd - Greatest Common Divisor (compact version with stack ops)
# Computes: r = gcd(a, b) using Euclidean algorithm

replace <BN_gcd>(gcd_r, gcd_a, gcd_b, _) by
	# Convert inputs to bitvectors
	pushBN gcd_a
	popBV gcd_x<2056>

	pushBN gcd_b
	popBV gcd_y<2056>

	# Euclidean algorithm: while y != 0: temp = x % y; x = y; y = temp
	# Limited to 2056 iterations
	for gcd_i<32> in 0 to 2055 do
		# Check if y is zero (done)
		gcd_done<32> := gcd_y = 0 ? 1 : 0

		# Compute temp = x mod y (only if y != 0)
		gcd_temp<2056> := gcd_y = 0 ? 0 : gcd_x % gcd_y

		# Update: x = y, y = temp (only if not done)
		gcd_x := gcd_done = 1 ? gcd_x : gcd_y
		gcd_y := gcd_done = 1 ? 0 : gcd_temp

		# Early exit if done
		gcd_x := gcd_done = 1 ? gcd_x : gcd_x
	end

	# Store result
	pushBV gcd_x
	popBN gcd_r

	return 1
end
