# BN_mod_mul - Modular multiplication (compact version)
# Computes: r = (a * b) mod m
# Note: This is NOT Montgomery multiplication

replace <BN_mod_mul>(modmul_r, modmul_a, modmul_b, modmul_m, _) by
	# Reduce both operands first
	pushBN modmul_a
	pushBN modmul_m
	modUBN

	pushBN modmul_b
	pushBN modmul_m
	modUBN

	# Multiply
	mulBN

	# Reduce result mod m
	pushBN modmul_m
	modUBN

	# Store result
	popBN modmul_r

	return 1
end
