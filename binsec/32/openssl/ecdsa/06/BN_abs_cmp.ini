# BN_abs_cmp - Absolute value comparison (compact, constant-time version)
# Returns: -1 if |a| < |b|, 0 if |a| == |b|, 1 if |a| > |b|
# Uses constant-time conditional expressions

replace <BN_abs_cmp>(abscmp_a, abscmp_b) by
	# Convert to bitvectors
	pushBN abscmp_a
	popBV abscmp_a_bv<2056>

	pushBN abscmp_b
	popBV abscmp_b_bv<2056>

	# Compute difference: diff = a - b
	abscmp_diff<2056> := abscmp_a_bv - abscmp_b_bv

	# Return: 0 if equal, -1 if a < b (MSB of diff is 1), 1 if a > b
	abscmp_result<32> := abscmp_diff = 0 ? 0 : (abscmp_diff{2055} = 1 ? -1 : 1)

	return abscmp_result
end
