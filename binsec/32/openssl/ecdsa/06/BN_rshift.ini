# BN_rshift - Right shift operation
# Computes: r = a >> n (arithmetic right shift by n bits)

replace <BN_rshift>(rshift_r, rshift_a, rshift_n) by
	# Convert input to bitvector
	pushBN rshift_a
	rshift_n_bv<2056> := uext2056 rshift_n
	pushBV rshift_n_bv
	rightSShiftBN
	popBN rshift_r

	return 1
end

replace <BN_rshift1>(rshift1_r, rshift1_a) by
	# Special case: right shift by 1 bit
	# More efficient than general rshift

	pushBN rshift1_a
	rshift1_n_bv<2056> := 1
	pushBV rshift1_n_bv
	rightSShiftBN
	popBN rshift1_r

	return 1
end
