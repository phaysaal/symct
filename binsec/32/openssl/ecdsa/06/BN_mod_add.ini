# BN_mod_add - Modular addition (compact version)
# Computes: r = (a + b) mod m

replace <BN_mod_add>(modadd_r, modadd_a, modadd_b, modadd_m, _) by
	# Reduce a mod m
	pushBN modadd_a
	pushBN modadd_m
	modUBN

	# Reduce b mod m
	pushBN modadd_b
	pushBN modadd_m
	modUBN

	# Add: (a mod m) + (b mod m)
	addBN

	# Reduce result mod m
	pushBN modadd_m
	modUBN

	# Store result
	popBN modadd_r

	return 1
end
