const_rnd_buf<32> := 0x6fff0000
@[const_rnd_buf, 32] := 0xde543cdba2de7d2899bc01bed90ef3b0b1d8c3a5a9863f30535ca15c3d0baa32

replace <RAND_bytes_ex>(ctx, buf, num, strength) by
        print buf
        print num
        print strength
        for i<32> in 0 to num-1 do
            j<32> := i % 32
            @[buf+i, 1] := @[const_rnd_buf+j, 1]
        end
        return 1
end

