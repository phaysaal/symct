# BN_ucmp - Unsigned comparison (ignores sign)
# Returns: -1 if |a| < |b|, 0 if |a| == |b|, 1 if |a| > |b|

replace <BN_ucmp>(ucmp_a, ucmp_b) by
	pushBN ucmp_a
	popBV ucmp_a_bv<2056>

	pushBN ucmp_b
	popBV ucmp_b_bv<2056>

	ucmp_diff<2056> := ucmp_a_bv - ucmp_b_bv
	ucmp_result<32> := ucmp_diff = 0 ? 0 : (ucmp_diff{2055} = 1 ? -1 : 1)

	return ucmp_result
end
