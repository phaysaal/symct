# BN_exp - Exponentiation: r = a^p
# Uses square-and-multiply algorithm

replace <BN_exp>(exp_r, exp_a, exp_p, _) by
	pushBN exp_a
	popBV exp_a_bv<2056>

	pushBN exp_p
	popBV exp_p_bv<2056>

	exp_result<2056> := 1
	exp_base<2056> := exp_a_bv

	for exp_j<2056> in 0 to 2055 do
		exp_i<2056> := 2055 - exp_j
		exp_r2<2056> := exp_result * exp_result
		exp_r3<2056> := exp_r2 * exp_base
		bit<2056> := (exp_p_bv lsr exp_i) & 0x1
		mask<2056> := 0 - bit
		exp_result := (exp_r3 & mask) | (exp_r2 & ~mask)
	end

	pushBV exp_result
	popBN exp_r

	return 1
end
