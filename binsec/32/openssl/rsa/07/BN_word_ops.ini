# BN_set_word - Set BIGNUM to a single word value
# BN_get_word - Get single word value from BIGNUM
# BN_add_word - Add a word to BIGNUM
# BN_sub_word - Subtract a word from BIGNUM
# BN_mul_word - Multiply BIGNUM by a word
# BN_div_word - Divide BIGNUM by a word (returns remainder)
# BN_mod_word - BIGNUM mod a word (returns remainder)

replace <BN_set_word>(sw_a, sw_w) by
	sw_bv<2056> := uext2056 sw_w
	pushBV sw_bv
	popBN sw_a
	return 1
end

replace <BN_get_word>(gw_a) by
	pushBN gw_a
	popBV gw_bv<2056>
	gw_ret<32> := gw_bv{31..0}
	return gw_ret
end

replace <BN_add_word>(aw_a, aw_w) by
	pushBN aw_a
	popBV aw_bv<2056>
	aw_bv := aw_bv + (uext2056 aw_w)
	pushBV aw_bv
	popBN aw_a
	return 1
end

replace <BN_sub_word>(subw_a, subw_w) by
	pushBN subw_a
	popBV subw_bv<2056>
	subw_bv := subw_bv - (uext2056 subw_w)
	pushBV subw_bv
	popBN subw_a
	return 1
end

replace <BN_mul_word>(mw_a, mw_w) by
	pushBN mw_a
	popBV mw_bv<2056>
	mw_bv := mw_bv * (uext2056 mw_w)
	pushBV mw_bv
	popBN mw_a
	return 1
end

replace <BN_div_word>(dw_a, dw_w) by
	pushBN dw_a
	popBV dw_bv<2056>
	dw_w_bv<2056> := uext2056 dw_w
	dw_w_bv := dw_w_bv = 0 ? dw_w_bv+1 : dw_w_bv
	dw_rem<2056> := dw_bv % dw_w_bv
	dw_quot<2056> := dw_bv / dw_w_bv
	pushBV dw_quot
	popBN dw_a
	return dw_rem{31..0}
end

replace <BN_mod_word>(modw_a, modw_w) by
	pushBN modw_a
	popBV modw_bv<2056>
	modw_w_bv<2056> := uext2056 modw_w
	modw_w_bv := modw_w_bv = 0 ? modw_w_bv+1 : modw_w_bv
	modw_rem<2056> := modw_bv % modw_w_bv
	return modw_rem{31..0}
end
