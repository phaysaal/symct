# Fixed Montgomery Multiplication Implementation
# Generated by LLM - Mathematically Correct CIOS Algorithm
#
# Montgomery multiplication computes: Mont(a,b) = (a * b * R^-1) mod N
# where R = 2^(bits_in_N) is the Montgomery constant
#
# This uses the CIOS (Coarsely Integrated Operand Scanning) algorithm:
# 1. t = a * b
# 2. mu = (t mod R) * Ni mod R, where Ni = -N^-1 mod R
# 3. s = t + mu * N
# 4. u = s / R  (right shift)
# 5. if u >= N then u = u - N
# 6. return u

replace <BN_mod_mul_montgomery>(modmul_r, modmul_a, modmul_b, modmul_mont, _) by
	# Extract Montgomery context fields
	# mont->ri = number of bits in R (typically bits in N)
	# mont->N = modulus (offset +24)
	# mont->Ni = -N^-1 mod R (offset +44)

	modmul_ri<32> := @[modmul_mont, 4]
	modmul_RR<5112> := (1 lsl (uext5112 modmul_ri))

	modmul_N<32> := modmul_mont+24
	modmul_Ni<32> := modmul_mont+44

	# Convert inputs to bitvectors
	pushBN modmul_N
	popBV modmul_N_bv<2056>
	modmul_N_bv4<5112> := uext5112 modmul_N_bv

	pushBN modmul_a
	popBV modmul_a_bv<2056>
	modmul_a_bv4<5112> := uext5112 (modmul_a_bv % modmul_N_bv)

	pushBN modmul_b
	popBV modmul_b_bv<2056>
	modmul_b_bv4<5112> := uext5112 (modmul_b_bv % modmul_N_bv)

	pushBN modmul_Ni
	popBV modmul_Ni_bv<2056>
	modmul_Ni_bv4<5112> := uext5112 modmul_Ni_bv

	# CIOS Montgomery Multiplication Algorithm

	# Step 1: t = a * b
	modmul_t<5112> := modmul_a_bv4 * modmul_b_bv4

	# Step 2: mu = (t mod R) * Ni mod R
	# Since R = 2^ri, (t mod R) is just the lower ri bits
	# For simplicity with variable R, we compute: mu = (t * Ni) mod R
	modmul_mu<5112> := (modmul_t * modmul_Ni_bv4) % modmul_RR

	# Step 3: s = t + mu * N
	modmul_s<5112> := modmul_t + (modmul_mu * modmul_N_bv4)

	# Step 4: u = s / R (equivalent to right shift by ri bits)
	modmul_u<5112> := modmul_s lsr (uext5112 modmul_ri)

	# Step 5: if u >= N then u = u - N (final reduction)
	modmul_u := modmul_u >= modmul_N_bv4 ? modmul_u - modmul_N_bv4 : modmul_u

	# Step 6: Store result
	modmul_r_bv<2056> := modmul_u{2055..0}
	pushBV modmul_r_bv
	popBN modmul_r

	return 1
end

replace <bn_mul_mont_fixed_top>(modmul_r, modmul_a, modmul_b, modmul_mont, _) by
	# Fixed-top variant uses same algorithm as BN_mod_mul_montgomery
	# The "fixed_top" refers to internal OpenSSL implementation details
	# where the top word is guaranteed to be set

	# Extract Montgomery context fields
	modmul_ri<32> := @[modmul_mont, 4]
	modmul_RR<5112> := (1 lsl (uext5112 modmul_ri))

	modmul_N<32> := modmul_mont+24
	modmul_Ni<32> := modmul_mont+44

	# Convert inputs to bitvectors
	pushBN modmul_N
	popBV modmul_N_bv<2056>
	modmul_N_bv4<5112> := uext5112 modmul_N_bv

	pushBN modmul_a
	popBV modmul_a_bv<2056>
	modmul_a_bv4<5112> := uext5112 (modmul_a_bv % modmul_N_bv)

	pushBN modmul_b
	popBV modmul_b_bv<2056>
	modmul_b_bv4<5112> := uext5112 (modmul_b_bv % modmul_N_bv)

	pushBN modmul_Ni
	popBV modmul_Ni_bv<2056>
	modmul_Ni_bv4<5112> := uext5112 modmul_Ni_bv

	# CIOS Montgomery Multiplication Algorithm

	# Step 1: t = a * b
	modmul_t<5112> := modmul_a_bv4 * modmul_b_bv4

	# Step 2: mu = (t mod R) * Ni mod R
	modmul_mu<5112> := (modmul_t * modmul_Ni_bv4) % modmul_RR

	# Step 3: s = t + mu * N
	modmul_s<5112> := modmul_t + (modmul_mu * modmul_N_bv4)

	# Step 4: u = s / R (right shift by ri bits)
	modmul_u<5112> := modmul_s lsr (uext5112 modmul_ri)

	# Step 5: if u >= N then u = u - N
	modmul_u := modmul_u >= modmul_N_bv4 ? modmul_u - modmul_N_bv4 : modmul_u

	# Step 6: Store result
	modmul_r_bv<2056> := modmul_u{2055..0}
	pushBV modmul_r_bv
	popBN modmul_r

	return 1
end
