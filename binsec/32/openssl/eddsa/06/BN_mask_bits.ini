# BN_mask_bits - Mask/truncate to n bits (compact version)
# Computes: r = a & ((1 << n) - 1)

replace <BN_mask_bits>(mask_a, mask_n) by
	# Convert input to bitvector
	pushBN mask_a
	popBV mask_a_bv<2056>

	# Create mask: (1 << n) - 1
	# Handle edge cases with conditional
	mask_value<2056> := mask_n <= 0 ? 0 : (mask_n >= 2056 ? -1 : ((1 lsl (uext2056 mask_n)) - 1))

	# Apply mask
	mask_result<2056> := mask_a_bv & mask_value

	# Store result back (in-place modification)
	pushBV mask_result
	popBN mask_a

	return 1
end
