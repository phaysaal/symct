# BN_cmp - Signed comparison (compact, constant-time version)
# Returns: -1 if a < b, 0 if a == b, 1 if a > b

replace <BN_cmp>(cmp_a, cmp_b) by
	# Convert to bitvectors
	pushBN cmp_a
	popBV cmp_a_bv<2056>

	pushBN cmp_b
	popBV cmp_b_bv<2056>

	# Compute difference: diff = a - b
	cmp_diff<2056> := cmp_a_bv - cmp_b_bv

	# Return: 0 if equal, -1 if a < b (MSB is 1), 1 if a > b
	cmp_result<32> := cmp_diff = 0 ? 0 : (cmp_diff{2055} = 1 ? -1 : 1)

	return cmp_result
end

replace <BN_is_zero>(is_zero_a) by
	# Check if BIGNUM is zero
	pushBN is_zero_a
	popBV is_zero_a_bv<2056>

	# Return: 1 if zero, 0 otherwise (constant-time)
	is_zero_result<32> := is_zero_a_bv = 0 ? 1 : 0

	return is_zero_result
end

replace <BN_is_one>(is_one_a) by
	# Check if BIGNUM is one
	pushBN is_one_a
	popBV is_one_a_bv<2056>

	# Return: 1 if one, 0 otherwise (constant-time)
	is_one_result<32> := is_one_a_bv = 1 ? 1 : 0

	return is_one_result
end
