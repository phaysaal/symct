# BN_add and BN_sub - Basic addition and subtraction (compact version)

replace <BN_add>(add_r, add_a, add_b) by
	# r = a + b
	pushBN add_a
	pushBN add_b
	addBN
	popBN add_r

	return 1
end

replace <BN_sub>(sub_r, sub_a, sub_b) by
	# r = a - b
	pushBN sub_a
	pushBN sub_b
	subBN
	popBN sub_r

	return 1
end

replace <BN_uadd>(uadd_r, uadd_a, uadd_b) by
	# Unsigned addition (same as BN_add for BIGNUMs)
	pushBN uadd_a
	pushBN uadd_b
	addBN
	popBN uadd_r

	return 1
end

replace <BN_usub>(usub_r, usub_a, usub_b) by
	# Unsigned subtraction (same as BN_sub for BIGNUMs)
	pushBN usub_a
	pushBN usub_b
	subBN
	popBN usub_r

	return 1
end
