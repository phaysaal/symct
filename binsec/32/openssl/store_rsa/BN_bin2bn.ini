replace <BN_bin2bn>(bin2bn2_s, bin2bn2_s_len, bin2bn2_s_ret) by
        
        
        new_addr<32> := bin2bn2_s_ret = 0 ? base_addr + 0x14 : base_addr
        bin2bn2_s_ret := bin2bn2_s_ret = 0 ? base_addr : bin2bn2_s_ret
        base_addr := new_addr
        @[bin2bn2_s_ret,4] := base_addr
        base_addr := base_addr + 0x100
	
	d_tmp<32> := 0x2f000000
	@[d_tmp,0x100] := 0
	for i<32> in 0 to bin2bn2_s_len-1 do
            	@[d_tmp+i, 1] := @[bin2bn2_s+bin2bn2_s_len-i-1, 1]
        end
	bin2bn2_s_bv<2056> := uext2056 @[d_tmp, 0x100]
	
	pushBV bin2bn2_s_bv
	
	popBN bin2bn2_s_ret
	
	print bin2bn2_s_ret
        return bin2bn2_s_ret
end

