replace <BN_div>(dv, rm, num, divisor, _) by
        pushBN num
        popBV bv_num<2056>
        
	pushBN divisor
        popBV bv_divisor<2056>

	bv_divisor := bv_divisor = 0 ? bv_divisor+1: bv_divisor
        
           if dv <> 0 then
              call_macro mk_safe(dv)
              bv_dv<2056> := bv_divisor = 0 ? 0 : bv_num / bv_divisor
              pushBV bv_dv
              popBN dv
           end
           if rm <> 0 then 
              call_macro mk_safe(rm)
              bv_rm<2056> := bv_divisor = 0 ? 0 : bv_num % bv_divisor
              pushBV bv_rm
              popBV rm
	   end
        
	return 1
end
