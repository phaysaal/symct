@[@[<rsa_d>, 4], 0x100] := secret
@[@[<rsa_p>, 4], 0x80] := secret
@[@[<rsa_q>, 4], 0x80] := secret
@[@[<rsa_dmp1>, 4], 0x80] := secret
@[@[<rsa_dmq1>, 4], 0x80] := secret
@[@[<rsa_iqmp>, 4], 0x80] := secret
@[@[<rsa_n>, 4], 0x100] := nondet
@[@[<rsa_e>, 4], 3] := nondet

hook <wc_RsaPrivateDecrypt>(dec_in, _) with
	@[dec_in, 0x20] := nondet
end

hook <wc_RsaSSL_Sign>(sign_in, _) with
	@[sign_in, 0x20] := nondet
end
