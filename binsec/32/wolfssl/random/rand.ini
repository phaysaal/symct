replace <wc_RNG_GenerateBlock>(rand_rng, rand_output, rand_sz) by
	@[rand_output,16] := nondet
	@[rand_output+16,16] := nondet
	@[rand_output+32,16] :=	nondet
	@[rand_output+48,16] :=	nondet
	@[rand_output+64,16] :=	nondet
	@[rand_output+80,16] :=	nondet
	@[rand_output+96,16] :=	nondet
	@[rand_output+112,16] := nondet
	@[rand_output+128,16] := nondet
	@[rand_output+144,16] := nondet
	@[rand_output+160,16] := nondet
	@[rand_output+176,16] := nondet
	@[rand_output+192,16] := nondet
	@[rand_output+208,16] := nondet
	@[rand_output+224,16] := nondet
	@[rand_output+240,16] := nondet
        return 0
end

replace <getpid>(_) by
	pid_nd<32> := nondet as pidv
	assume pidv > 0x100000
	return pid_nd
end


