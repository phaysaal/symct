const_rnd_buf<32> := 0x6fff0000
@[const_rnd_buf, 32]    := 0xf1a1d6d5a658a345df1555978bc615f8dab229f308adebaaab71a17fd7e5ba2a
@[const_rnd_buf+32, 32] := 0x8e5f3a6e8beadbe275b4386088ea2ab11941be82e2663369853071b71b6d834f


replace <wc_RNG_GenerateBlock>(rand_rng, rand_output, rand_sz) by
        for i<32> in 0 to rand_sz-1 do
            j<32> := i % 64
            @[rand_output+i, 1] := @[const_rnd_buf+j, 1]
        end
        return 0
end

