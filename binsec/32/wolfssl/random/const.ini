const_rnd_buf<32> := 0x6fff0000
rnd_call<4> := 0
replace <wc_RNG_GenerateBlock>(rand_rng, rand_output, rand_sz) by
	if rnd_call = 0 then
		@[rand_output,16]    := 0xc038ae842449fda4881717407ee92cdb
		@[rand_output+16,16] := 0x38cb43690b288c329a577e5b326b1923
		@[rand_output+32,8] :=	0xc210cd94f1092830
		
		rnd_call := 1
	else 
	 	if rnd_call = 1 then
			@[rand_output,16] := 0xe9b87a471bbac853fe36fcebab744749
			@[rand_output+16,16] := 0x36e45f611d6c9209067bb1fc85fbebfb
			@[rand_output+32,8] :=	0x524f2fa8d2dac5db
			rnd_call := 2
		else
			if rnd_call = 2 then
				@[rand_output,16] := 0x3f5b3e5a4cc6fadbabedbeff12a4bf21
				@[rand_output+16,16] := 0xd0f99cad97cb322861dbf540cd60d8f3
				@[rand_output+32,8] :=	0x5efa084d3cdbcaf4
				rnd_call := 3
			else
				@[rand_output,16] := 0xf5580ab017598b71e0ce3698363d97c3
				@[rand_output+16,16] := 0x6327d041fc95f044132747515fd20290
				@[rand_output+32,8] :=	0xfff63ab8463178fd
			end
		end	
	end
        return 0
end
