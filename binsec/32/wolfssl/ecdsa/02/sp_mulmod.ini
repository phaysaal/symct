replace <sp_mulmod>(mul_a, mul_b, mul_m, mul_r) by
        pushBN mul_a
        pushBN mul_m
        modUBN
        pushBN mul_b
        pushBN mul_m
        modUBN
        mulBN
        popBN mul_r
        
        print @[mul_a+8, 0x40]
        print @[mul_b+8, 0x40]
	print mul_r
	print @[mul_r,2]
        print @[mul_r+8, 0x40]

        return 0
end

replace <sp_mul>(mul_a, mul_b, mul_r) by
        pushBN mul_a
        pushBN mul_b
        mulBN
        popBN mul_r
        
        
        print @[mul_a+8, 0x40]
        print @[mul_b+8, 0x40]
	print mul_r
	print @[mul_r,2]
        print @[mul_r+8, 0x40]

        return 0
end
