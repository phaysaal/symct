replace <sp_count_bits>(bits_a) by
        pushBN bits_a
        bits_r<32> := 0
        popBV bits_a_bv<512>
	
	bits_f<1> := 0
	for bits_i<32> in 704 to 1023 do
		bits_lsb<1> := (bits_a_bv lsr (uext512 (1023-bits_i))){0}
		bits_r := (bits_f | bits_lsb) = 0x1 ? bits_r : bits_r + 1
		bits_f := (bits_f | bits_lsb) ? 1 : bits_f
	end
	bits_r := ((1024-704)-bits_r)
	return bits_r
end
