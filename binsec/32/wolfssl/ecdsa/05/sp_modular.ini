replace <sp_sqrmod>(sqm_a, sqm_m, sqm_r) by
	pushBN sqm_a
	pushBN sqm_m
	modUBN
	pushBN sqm_a
	pushBN sqm_m
	modUBN
	mulBN
	pushBN sqm_m
	modUBN
	popBN sqm_r
	return 0
end
