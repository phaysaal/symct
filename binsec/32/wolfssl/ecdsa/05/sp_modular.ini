replace <sp_addmod>(am_a, am_b, am_m, am_r) by
	pushBN am_a
	pushBN am_b
	addBN
	pushBN am_m
	modUBN
	popBN am_r
	return 0
end

replace <sp_submod>(sm_a, sm_b, sm_m, sm_r) by
	pushBN sm_a
	popBV sm_a_bv<512>
	pushBN sm_b
	popBV sm_b_bv<512>
	pushBN sm_m
	popBV sm_m_bv<512>
	sm_m_bv := sm_m_bv = 0 ? 1 : sm_m_bv
	sm_r_bv<1024> := ((uext1024 sm_a_bv) - (uext1024 sm_b_bv) + (uext1024 sm_m_bv)) % (uext1024 sm_m_bv)
	sm_result<512> := sm_r_bv{511..0}
	pushBV sm_result
	popBN sm_r
	return 0
end

