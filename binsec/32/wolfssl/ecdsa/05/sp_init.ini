replace <sp_init>(ini_a) by
	@[ini_a, 2] := 0
	@[ini_a+2, 2] := 16
	@[ini_a+4, 1] := 0
	return 0
end

replace <sp_init_size>(inis_a, inis_size) by
	@[inis_a, 2] := 0
	@[inis_a+2, 2] := inis_size{15..0}
	@[inis_a+4, 1] := 0
	return 0
end

replace <sp_init_copy>(inic_r, inic_a) by
	pushBN inic_a
	popBN inic_r
	return 0
end

replace <sp_exch>(exch_a, exch_b) by
	pushBN exch_a
	popBV exch_tmp<512>
	pushBN exch_b
	popBN exch_a
	pushBV exch_tmp
	popBN exch_b
	return 0
end


