replace <sp_sub_d>(sd_a, sd_d, sd_r) by
	pushBN sd_a
	sd_d_bv<512> := uext512 sd_d
	pushBV sd_d_bv
	subBN
	popBN sd_r
	return 0
end

replace <sp_mul_d>(md_a, md_d, md_r) by
	pushBN md_a
	popBV md_a_bv<512>
	md_d_bv<1024> := uext1024 md_d
	md_a_ext<1024> := uext1024 md_a_bv
	md_result<1024> := md_a_ext * md_d_bv
	md_r_bv<512> := md_result{511..0}
	pushBV md_r_bv
	popBN md_r
	return 0
end

replace <sp_div_d>(dd_a, dd_d, dd_r, dd_rem) by
	pushBN dd_a
	popBV dd_a_bv<512>
	dd_d_bv<512> := uext512 dd_d
	dd_d_bv := dd_d_bv = 0 ? 1 : dd_d_bv
	if dd_r <> 0 then
		dd_q_bv<512> := dd_a_bv / dd_d_bv
		pushBV dd_q_bv
		popBN dd_r
	end
	if dd_rem <> 0 then
		dd_rem_bv<512> := dd_a_bv % dd_d_bv
		@[dd_rem, 4] := dd_rem_bv{31..0}
	end
	return 0
end

replace <sp_mod_d>(modd_a, modd_d, modd_r) by
	pushBN modd_a
	popBV modd_a_bv<512>
	modd_d_bv<512> := uext512 modd_d
	modd_d_bv := modd_d_bv = 0 ? 1 : modd_d_bv
	modd_rem_bv<512> := modd_a_bv % modd_d_bv
	@[modd_r, 4] := modd_rem_bv{31..0}
	return 0
end
