replace <sp_mont_setup>(ms_m, ms_rho) by
	ms_m0<32> := @[ms_m+8, 4]
	y<32> := 2 - ms_m0
	y := y * (2 - y * ms_m0)
	y := y * (2 - y * ms_m0)
	y := y * (2 - y * ms_m0)
	y := y * (2 - y * ms_m0)
	ms_result<32> := (ms_m0 & 1) = 1 ? (-y) : 0
	@[ms_rho, 4] := ms_result
	return 0
end

replace <sp_mont_norm>(mn_norm, mn_m) by
	mn_used<32> := uext32 @[mn_m, 2]
	mn_bits<32> := mn_used * 32
	pushBN mn_m
	popBV mn_m_bv<512>
	mn_m_bv := mn_m_bv = 0 ? 1 : mn_m_bv
	mn_r<512> := 1
	for i<32> in 0 to 511 do
		mn_r := i < mn_bits ? (mn_r lsl 1) % mn_m_bv : mn_r
	end
	pushBV mn_r
	popBN mn_norm
	return 0
end

replace <sp_mont_red_ex>(mr_a, mr_m, mr_mp, mr_ct) by
	pushBN mr_a
	popBV mr_a_bv<512>
	pushBN mr_m
	popBV mr_m_bv<512>
	mr_m_bv := mr_m_bv | 0x1
	mr_used<32> := uext32 @[mr_m, 2]
	for i<32> in 0 to 15 do
		f<32> := i < mr_used ? (mr_a_bv{31..0} * mr_mp) : 0
		mr_a_bv := i < mr_used ? (mr_a_bv + (uext512 f) * mr_m_bv) lsr 32 : mr_a_bv
	end
	mr_a_bv := mr_a_bv >= mr_m_bv ? mr_a_bv - mr_m_bv : mr_a_bv
	pushBV mr_a_bv
	popBN mr_a
	return 0
end
