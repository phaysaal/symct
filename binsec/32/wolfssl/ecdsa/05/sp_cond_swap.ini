replace <sp_cond_swap_ct>(cs_a, cs_b, cs_cnt, cs_swap) by
	pushBN cs_a
	popBV cs_a_bv<512>
	pushBN cs_b
	popBV cs_b_bv<512>
	cs_mask<512> := 0 - (uext512 (cs_swap & 1))
	cs_diff<512> := cs_a_bv ^ cs_b_bv
	cs_masked_diff<512> := cs_diff & cs_mask
	cs_new_a<512> := cs_a_bv ^ cs_masked_diff
	cs_new_b<512> := cs_b_bv ^ cs_masked_diff
	pushBV cs_new_a
	popBN cs_a
	pushBV cs_new_b
	popBN cs_b
	return 0
end

replace <sp_cond_swap_ct_ex>(csex_a, csex_b, csex_cnt, csex_swap, csex_t) by
	pushBN csex_a
	popBV csex_a_bv<512>
	pushBN csex_b
	popBV csex_b_bv<512>
	csex_mask<512> := 0 - (uext512 (csex_swap & 1))
	csex_diff<512> := csex_a_bv ^ csex_b_bv
	csex_masked_diff<512> := csex_diff & csex_mask
	csex_new_a<512> := csex_a_bv ^ csex_masked_diff
	csex_new_b<512> := csex_b_bv ^ csex_masked_diff
	pushBV csex_new_a
	popBN csex_a
	pushBV csex_new_b
	popBN csex_b
	return 0
end
