replace <sp_invmod_mont_ct>(imc_a, imc_m, imc_r, imc_mp) by
	pushBN imc_a
	popBV imc_a_bv<512>
	pushBN imc_m
	popBV imc_m_bv<512>
	imc_m_bv := imc_m_bv = 0 ? 1 : imc_m_bv

	imc_exp<4128> := (uext4128 imc_m_bv) - 2
	imc_result<4128> := 1
	imc_base<4128> := (uext4128 imc_a_bv) % (uext4128 imc_m_bv)

	imc_bit_pos<4128> := 0
	while imc_bit_pos < 512 do
		imc_exp_shifted<4128> := imc_exp lsr imc_bit_pos
		imc_exp_bit<4128> := imc_exp_shifted & 0x1
		imc_new_result<4128> := (imc_result * imc_base) % (uext4128 imc_m_bv)
		imc_exp_mask<4128> := -imc_exp_bit
		imc_not_mask<4128> := imc_exp_bit - 0x1
		imc_result := (imc_exp_mask & imc_new_result) | (imc_not_mask & imc_result)
		imc_base := (imc_base * imc_base) % (uext4128 imc_m_bv)
		imc_bit_pos := imc_bit_pos + 0x1
	end

	imc_r_bv<512> := imc_result{511..0}
	pushBV imc_r_bv
	popBN imc_r
	return 0
end
