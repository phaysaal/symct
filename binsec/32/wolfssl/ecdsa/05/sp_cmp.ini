replace <sp_cmp>(cmp_a, cmp_b) by
	pushBN cmp_a
	popBV cmp_a_bv<512>
	pushBN cmp_b
	popBV cmp_b_bv<512>
	cmp_a_sign<32> := uext32 @[cmp_a+4, 1]
	cmp_b_sign<32> := uext32 @[cmp_b+4, 1]
	cmp_mag<32> := cmp_a_bv = cmp_b_bv ? 0 : (cmp_a_bv > cmp_b_bv ? 1 : -1)
	result<32> := cmp_a_sign <> cmp_b_sign ? (cmp_a_sign = 1 ? -1 : 1) : (cmp_a_sign = 1 ? (0 - cmp_mag) : cmp_mag)
	return result
end

replace <sp_cmp_mag>(cmag_a, cmag_b) by
	pushBN cmag_a
	popBV cmag_a_bv<512>
	pushBN cmag_b
	popBV cmag_b_bv<512>
	result<32> := cmag_a_bv = cmag_b_bv ? 0 : (cmag_a_bv > cmag_b_bv ? 1 : -1)
	return result
end

replace <sp_cmp_d>(cd_a, cd_d) by
	pushBN cd_a
	popBV cd_a_bv<512>
	cd_d_bv<512> := uext512 cd_d
	cd_sign<32> := uext32 @[cd_a+4, 1]
	result<32> := cd_sign = 1 ? -1 : (cd_a_bv = cd_d_bv ? 0 : (cd_a_bv > cd_d_bv ? 1 : -1))
	return result
end
