replace <sp_rshb>(rsh_a, rsh_n, rsh_r) by
	pushBN rsh_a
	popBV rsh_bv<512>
	rsh_bv := rsh_bv lsr (uext512 rsh_n)
	pushBV rsh_bv
	popBN rsh_r
	return 0
end

replace <sp_div_2>(d2_a, d2_r) by
	pushBN d2_a
	popBV d2_bv<512>
	d2_bv := d2_bv lsr 1
	pushBV d2_bv
	popBN d2_r
	return 0
end

replace <sp_div_2_mod_ct>(d2m_a, d2m_m, d2m_r) by
	pushBN d2m_a
	popBV d2m_a_bv<512>
	pushBN d2m_m
	popBV d2m_m_bv<512>
	d2m_odd<512> := d2m_a_bv & 0x1
	d2m_sum<512> := d2m_a_bv + (d2m_odd = 1 ? d2m_m_bv : 0)
	d2m_result<512> := d2m_sum lsr 1
	pushBV d2m_result
	popBN d2m_r
	return 0
end

replace <sp_lshd>(lsh_a, lsh_s) by
	pushBN lsh_a
	popBV lsh_bv<512>
	lsh_bits<512> := uext512 (lsh_s * 32)
	lsh_bv := lsh_bv lsl lsh_bits
	pushBV lsh_bv
	popBN lsh_a
	return 0
end

replace <sp_mul_2d>(m2d_a, m2d_e, m2d_r) by
	pushBN m2d_a
	popBV m2d_bv<512>
	m2d_bv := m2d_bv lsl (uext512 m2d_e)
	pushBV m2d_bv
	popBN m2d_r
	return 0
end

replace <sp_div_2d>(d2d_a, d2d_e, d2d_r, d2d_rem) by
	pushBN d2d_a
	popBV d2d_bv<512>
	if d2d_r <> 0 then
		d2d_q<512> := d2d_bv lsr (uext512 d2d_e)
		pushBV d2d_q
		popBN d2d_r
	end
	if d2d_rem <> 0 then
		d2d_mask<512> := (1 lsl (uext512 d2d_e)) - 1
		d2d_rem_bv<512> := d2d_bv & d2d_mask
		pushBV d2d_rem_bv
		popBN d2d_rem
	end
	return 0
end

replace <sp_mod_2d>(mod2d_a, mod2d_e, mod2d_r) by
	pushBN mod2d_a
	popBV mod2d_bv<512>
	mod2d_mask<512> := (1 lsl (uext512 mod2d_e)) - 1
	mod2d_result<512> := mod2d_bv & mod2d_mask
	pushBV mod2d_result
	popBN mod2d_r
	return 0
end
