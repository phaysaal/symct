replace <sp_gcd>(gcd_a, gcd_b, gcd_r) by
	pushBN gcd_a
	popBV gcd_a_bv<512>
	pushBN gcd_b
	popBV gcd_b_bv<512>
	gcd_x<512> := gcd_a_bv
	gcd_y<512> := gcd_b_bv
	for i<32> in 0 to 511 do
		gcd_done<32> := (gcd_y = 0) ? 1 : 0
		gcd_temp<512> := (gcd_y = 0) ? 0 : gcd_x % gcd_y
		gcd_x := gcd_done = 1 ? gcd_x : gcd_y
		gcd_y := gcd_done = 1 ? 0 : gcd_temp
	end
	pushBV gcd_x
	popBN gcd_r
	return 0
end

replace <sp_lcm>(lcm_a, lcm_b, lcm_r) by
	pushBN lcm_a
	popBV lcm_a_bv<512>
	pushBN lcm_b
	popBV lcm_b_bv<512>
	gcd_x<512> := lcm_a_bv
	gcd_y<512> := lcm_b_bv
	for i<32> in 0 to 511 do
		gcd_done<32> := (gcd_y = 0) ? 1 : 0
		gcd_temp<512> := (gcd_y = 0) ? 0 : gcd_x % gcd_y
		gcd_x := gcd_done = 1 ? gcd_x : gcd_y
		gcd_y := gcd_done = 1 ? 0 : gcd_temp
	end
	lcm_prod<1024> := (uext1024 lcm_a_bv) * (uext1024 lcm_b_bv)
	gcd_x_ext<1024> := gcd_x = 0 ? 1 : (uext1024 gcd_x)
	lcm_result<1024> := lcm_prod / gcd_x_ext
	lcm_r_bv<512> := lcm_result{511..0}
	pushBV lcm_r_bv
	popBN lcm_r
	return 0
end
