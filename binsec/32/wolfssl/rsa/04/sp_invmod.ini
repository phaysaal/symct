replace <sp_invmod>(im_a, im_m, im_r) by
    retval<32> := 0
    # Fermat's Little Theorem: a^(-1) = a^(m-2) mod m (for prime m)
    print im_a
    print im_m
    print im_r
    print @[im_a,2]
    print @[im_m,2]
    print @[im_a+8, 0x100]
    print @[im_m+8, 0x100]
    print @[im_m+4, 1]
        
    pushBN im_a
    popBV bv_aa<2056>
    pushBN im_m
    popBV bv_mm<2056>
    #bv_aa<2056> := @[im_a+8, 0x100]
    #bv_mm<2056> := @[im_m+8, 0x100]
    

    bv_a<4128> := uext4128 bv_aa
    bv_m<4128> := uext4128 bv_mm
    
    
    print bv_a
    print bv_m
    
    bv_exp_mi<4128> := bv_m - 2
    
    bv_result<4128> := 1
    bv_base<4128> := bv_a % bv_m
    
    bit_pos<4128> := 0
    while bit_pos < 2056 do
        bv_exp_shifted<4128> := bv_exp_mi lsr bit_pos
        exp_bit<4128> := bv_exp_shifted & 0x1
        
        bv_new_result<4128> := (bv_result * bv_base) % bv_m
        
        # Simplified mask computation
        exp_mask<4128> := -exp_bit
        not_exp_mask<4128> := exp_bit - 0x1       # ← Your optimization!
        
        bv_result := (exp_mask & bv_new_result) | (not_exp_mask & bv_result)
        
        bv_base := (bv_base * bv_base) % bv_m
        
        bit_pos := bit_pos + 0x1
        #print bv_result
        
    end
    
    is_zero<4128> := (bv_a = 0 ? 1 : 0)
    zero_mask<4128> := -is_zero
    not_zero_mask<4128> := is_zero - 1          # ← Apply here too!
    bv_r<2056> := ((not_zero_mask & bv_result) | (zero_mask & 0)){2055..0}    
    
    print bv_r
    print im_r

    pushBV bv_r
    popBN im_r
    #@[im_r, 2] := 0x40
    #@[im_r+2, 2] := 127
    #@[im_r+4, 1] := 0
    #@[im_r+8, 256] := bv_r 
    
    print @[im_r+8, 256]
    print @[im_r, 8]
    print retval
    
    return retval
end
