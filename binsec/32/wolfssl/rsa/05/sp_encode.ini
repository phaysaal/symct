replace <sp_to_unsigned_bin>(tub_a, tub_out) by
	pushBN tub_a
	popBV tub_bv<2056>
	# Count bytes needed
	tub_used<32> := uext32 @[tub_a, 2]
	tub_bytes<32> := tub_used * 4
	# Write big-endian bytes
	for i<32> in 0 to 255 do
		tub_idx<32> := tub_bytes - 1 - i
		@[tub_out + i] := i < tub_bytes ? @[tub_a + 8 + tub_idx] : 0
	end
	return 0
end

replace <sp_to_unsigned_bin_len>(tubl_a, tubl_out, tubl_outSz) by
	pushBN tubl_a
	popBV tubl_bv<2056>
	tubl_buf<32> := 0x6f100000
	@[tubl_buf, 256] := 0
	# Write value as little-endian bytes
	tubl_used<32> := uext32 @[tubl_a, 2]
	tubl_data_bytes<32> := tubl_used * 4
	# Reverse to big-endian into output
	for i<32> in 0 to 255 do
		tubl_src_idx<32> := tubl_outSz - 1 - i
		@[tubl_out + i] := i < tubl_outSz ? (tubl_src_idx < tubl_data_bytes ? @[tubl_a + 8 + tubl_src_idx] : 0) : 0
	end
	return 0
end

replace <sp_unsigned_bin_size>(ubs_a) by
	pushBN ubs_a
	popBV ubs_bv<2056>
	# Binary search for bit length
	btln<32> := 0
	bv<2056> := ubs_bv
	bv_p<2056> := bv lsr 1024
	btln := (bv_p = 0) ? btln : btln + 1024
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 512
	btln := (bv_p = 0) ? btln : btln + 512
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 256
	btln := (bv_p = 0) ? btln : btln + 256
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 128
	btln := (bv_p = 0) ? btln : btln + 128
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 64
	btln := (bv_p = 0) ? btln : btln + 64
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 32
	btln := (bv_p = 0) ? btln : btln + 32
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 16
	btln := (bv_p = 0) ? btln : btln + 16
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 8
	btln := (bv_p = 0) ? btln : btln + 8
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 4
	btln := (bv_p = 0) ? btln : btln + 4
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 2
	btln := (bv_p = 0) ? btln : btln + 2
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 1
	btln := (bv_p = 0) ? btln : btln + 1
	btln := (ubs_bv = 0) ? 0 : btln + 1
	# Bytes = (bits + 7) / 8
	return (btln + 7) lsr 3
end
