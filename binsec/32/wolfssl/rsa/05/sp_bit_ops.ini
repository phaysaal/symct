replace <sp_is_bit_set>(ibs_a, ibs_b) by
	pushBN ibs_a
	popBV ibs_bv<2056>
	ibs_bit<2056> := (ibs_bv lsr (uext2056 ibs_b)) & 0x1
	return ibs_bit{31..0}
end

replace <sp_set_bit>(sb_a, sb_i) by
	pushBN sb_a
	popBV sb_bv<2056>
	sb_mask<2056> := 1 lsl (uext2056 sb_i)
	sb_bv := sb_bv | sb_mask
	pushBV sb_bv
	popBN sb_a
	return 0
end

replace <sp_2expt>(exp_a, exp_e) by
	exp_bv<2056> := 1 lsl (uext2056 exp_e)
	pushBV exp_bv
	popBN exp_a
	return 0
end

replace <sp_cnt_lsb>(clsb_a) by
	pushBN clsb_a
	popBV clsb_bv<2056>
	# Count trailing zeros via binary search
	cnt<32> := 0
	bv<2056> := clsb_bv
	# If value is 0, return 0
	cnt := bv = 0 ? 0 : cnt
	t<2056> := bv & 0xFFFFFFFF
	cnt := (bv <> 0 && t = 0) ? cnt + 32 : cnt
	bv := (bv <> 0 && t = 0) ? bv lsr 32 : bv
	t := bv & 0xFFFF
	cnt := (bv <> 0 && t = 0) ? cnt + 16 : cnt
	bv := (bv <> 0 && t = 0) ? bv lsr 16 : bv
	t := bv & 0xFF
	cnt := (bv <> 0 && t = 0) ? cnt + 8 : cnt
	bv := (bv <> 0 && t = 0) ? bv lsr 8 : bv
	t := bv & 0xF
	cnt := (bv <> 0 && t = 0) ? cnt + 4 : cnt
	bv := (bv <> 0 && t = 0) ? bv lsr 4 : bv
	t := bv & 0x3
	cnt := (bv <> 0 && t = 0) ? cnt + 2 : cnt
	bv := (bv <> 0 && t = 0) ? bv lsr 2 : bv
	t := bv & 0x1
	cnt := (bv <> 0 && t = 0) ? cnt + 1 : cnt
	return clsb_bv = 0 ? 0 : cnt
end

