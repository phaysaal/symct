replace <sp_exptmod_ex>(exe_b, exe_e, exe_digits, exe_m, exe_r) by
	print exe_b
	print exe_e
	print exe_m
	print exe_r
	@[exe_m+8,1] := @[exe_m+8,1] & 0xfe
	print @[exe_b,5]
	print @[exe_e,5]
	print @[exe_m,5]
	print @[exe_b+8,0x100]
	print @[exe_e+8,0x100]
	print @[exe_m+8,0x100]

	if exe_b = 0 || exe_e = 0 || exe_m = 0 || exe_r = 0 then
		return -98
	end

	pushBN exe_m
	popBV exe_m_bv<2056>
	exe_m_bv := (@[exe_m,2] = 0 || @[exe_m+4,1] = 1 ? 1 : exe_m_bv)

	pushBN exe_b
	popBV exe_b_bv<2056>

	pushBN exe_e
	popBV exe_e_bv<2056>

	exe_b_bv_x<4112> := uext4112 exe_b_bv
	exe_e_bv_x<4112> := uext4112 exe_e_bv
	exe_m_bv_x<4112> := uext4112 exe_m_bv

	exe_result<4112> := 1
	exe_base<4112> := exe_b_bv_x % exe_m_bv_x
	# Process bits from LSB to MSB
	for i4112<4112> in 0 to 2055 do
		exe_bit_i<4112> := (exe_e_bv_x lsr i4112) & 0x1
		exe_temp<4112> := (exe_result * exe_base) % exe_m_bv_x
		exe_result := (exe_bit_i = 1) ? exe_temp : exe_result
		exe_base := (exe_base * exe_base) % exe_m_bv_x
	end

	exe_result_y<2056> := exe_result{2055..0}
	pushBV exe_result_y
	popBN exe_r

	return 0
end
