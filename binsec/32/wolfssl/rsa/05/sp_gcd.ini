replace <sp_gcd>(gcd_a, gcd_b, gcd_r) by
	pushBN gcd_a
	popBV gcd_a_bv<2056>
	pushBN gcd_b
	popBV gcd_b_bv<2056>
	# Euclidean algorithm (CT loop with fixed iterations)
	gcd_x<2056> := gcd_a_bv
	gcd_y<2056> := gcd_b_bv
	for i<32> in 0 to 2055 do
		gcd_done<32> := (gcd_y = 0) ? 1 : 0
		gcd_temp<2056> := (gcd_y = 0) ? 0 : gcd_x % gcd_y
		gcd_x := gcd_done = 1 ? gcd_x : gcd_y
		gcd_y := gcd_done = 1 ? 0 : gcd_temp
	end
	pushBV gcd_x
	popBN gcd_r
	return 0
end

replace <sp_lcm>(lcm_a, lcm_b, lcm_r) by
	pushBN lcm_a
	popBV lcm_a_bv<2056>
	pushBN lcm_b
	popBV lcm_b_bv<2056>
	# Compute GCD first
	gcd_x<2056> := lcm_a_bv
	gcd_y<2056> := lcm_b_bv
	for i<32> in 0 to 2055 do
		gcd_done<32> := (gcd_y = 0) ? 1 : 0
		gcd_temp<2056> := (gcd_y = 0) ? 0 : gcd_x % gcd_y
		gcd_x := gcd_done = 1 ? gcd_x : gcd_y
		gcd_y := gcd_done = 1 ? 0 : gcd_temp
	end
	# LCM = (a * b) / GCD(a, b)
	lcm_prod<4112> := (uext4112 lcm_a_bv) * (uext4112 lcm_b_bv)
	gcd_x_ext<4112> := gcd_x = 0 ? 1 : (uext4112 gcd_x)
	lcm_result<4112> := lcm_prod / gcd_x_ext
	lcm_r_bv<2056> := lcm_result{2055..0}
	pushBV lcm_r_bv
	popBN lcm_r
	return 0
end
