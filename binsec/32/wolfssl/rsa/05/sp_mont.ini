replace <sp_mont_setup>(ms_m, ms_rho) by
	# Compute -1/m[0] mod 2^32 (Montgomery parameter)
	ms_m0<32> := @[ms_m+8, 4]
	y<32> := 2 - ms_m0
	y := y * (2 - y * ms_m0)
	y := y * (2 - y * ms_m0)
	y := y * (2 - y * ms_m0)
	y := y * (2 - y * ms_m0)
	# rho = -y = -1/m0 mod 2^32 (only valid if m is odd)
	ms_result<32> := (ms_m0 & 1) = 1 ? (-y) : 0
	@[ms_rho, 4] := ms_result
	return 0
end

replace <sp_mont_norm>(mn_norm, mn_m) by
	# Compute R mod m, where R = 2^(used * WORD_SIZE)
	mn_used<32> := uext32 @[mn_m, 2]
	mn_bits<32> := mn_used * 32
	pushBN mn_m
	popBV mn_m_bv<2056>
	mn_m_bv := mn_m_bv = 0 ? 1 : mn_m_bv
	# R = 2^bits, compute R mod m
	# Use iterative doubling to avoid overflow: start with 1, shift left 1 bit and reduce, repeat
	mn_r<2056> := 1
	for i<32> in 0 to 2055 do
		mn_r := i < mn_bits ? (mn_r lsl 1) % mn_m_bv : mn_r
	end
	pushBV mn_r
	popBN mn_norm
	return 0
end

replace <sp_mont_red_ex>(mr_a, mr_m, mr_mp, mr_ct) by
	# Montgomery reduction: a = a * R^-1 mod m
	pushBN mr_a
	popBV mr_a_bv<2056>
	pushBN mr_m
	popBV mr_m_bv<2056>
	mr_m_bv := mr_m_bv | 0x1
	mr_used<32> := uext32 @[mr_m, 2]
	# Iterative Montgomery reduction: used iterations
	for i<32> in 0 to 63 do
		f<32> := i < mr_used ? (mr_a_bv{31..0} * mr_mp) : 0
		mr_a_bv := i < mr_used ? (mr_a_bv + (uext2056 f) * mr_m_bv) lsr 32 : mr_a_bv
	end
	# Final conditional subtraction
	mr_a_bv := mr_a_bv >= mr_m_bv ? mr_a_bv - mr_m_bv : mr_a_bv
	pushBV mr_a_bv
	popBN mr_a
	return 0
end
