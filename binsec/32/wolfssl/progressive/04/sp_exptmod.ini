replace <sp_exptmod>(exm_b, exm_e, exm_m, exm_r) by
	print exm_b
	print exm_e
	print exm_m
	print @[exm_b,5]
	print @[exm_e,5]
	print @[exm_m,5]
        print @[exm_b+8,0x100]
        print @[exm_e+8,0x100]
        print @[exm_m+8,0x100]
    
        if exm_b = 0 || exm_e = 0 || exm_m = 0 || exm_r = 0 then
        	return -98
        end
        
        pushBN exm_m
        popBV exm_m_bv<2056>
    	exm_m_bv<2056> := (@[exm_m,2] = 0 || @[exm_m+4,1] = 1 ? 1 : exm_m_bv)
    	print exm_m_bv
    	
    	pushBN exm_b
        popBV emx_b_bv<2056>
    
        pushBN exm_e
        popBV exm_e_bv<2056>
        
    	exm_result<2056> := 1
    	exm_base<2056> := exm_b_bv
    	exm_num_bits<2056> := uext2056 (@[exm_e,2] * 32)
    
    	# Process bits from LSB to MSB (naturally upward)
    	for i2056<2056> in 0 to 1023 do
    		#print i2056
        	# Extract bit i from LSB (right shift by i, take LSB)
        	exm_bit_i<2056> := (exm_e_bv lsr i2056)
        
        	# Conditional multiply (constant-time)
        	exm_temp<2056> := (exm_result * exm_base) % exm_m_bv
        	exm_result := (exm_bit_i = 1) ? ((i2056 < exm_num_bits) ? exm_temp : exm_result) : exm_result
        
        	# Square base for next iteration
        	exm_base := (exm_base * exm_base) % exm_m_bv
    	end
    
        pushBV exm_result
        popBN exm_r
        
        return 0
end

