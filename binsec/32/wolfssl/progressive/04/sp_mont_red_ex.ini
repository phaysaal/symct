replace <sp_mont_red_ex>(red_a, red_m, red_mp, _) by
        pushBN red_a
        popBV red_a_bv<2056>
        pushBN red_m
        popBV red_m_bv<2056>
        red_mp_bv<2056> := uext2056 red_mp

        mu_bv<2056> := red_mp_bv * (uext2056 (red_a_bv{1023..0}))
        red_a_bv := red_a_bv + (mu_bv * red_m_bv)

        red_a_bv := red_a_bv lsr 1024

        red_a_bv := red_a_bv >= red_m_bv ? red_a_bv-red_m_bv: red_a_bv 
        
        return 0
end
