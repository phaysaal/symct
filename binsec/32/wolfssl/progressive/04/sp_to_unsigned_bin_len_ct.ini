replace <sp_to_unsigned_bin_len_ct>(frombn_a, frombn_out, frombn_outSz) by

        if (frombn_a = 0) then
        	return 1 
    	end
    	
    	if (frombn_out = 0) then
    		return 1
    	end
    	
    	if (frombn_outSz < 0) then
        	return 1
        end
        
        # Extract structure fields
    	a_used<32> := uext32 @[frombn_a, 2]*4        # a->used (number of 32-bit digits)
    	
    
        for i<32> in 0 to frombn_outSz - 1 do
    		@[frombn_out+i] := i < (frombn_outSz-a_used) ? 0 : @[frombn_a+8+(frombn_outSz-1-i)]
	end
        return 0
end
