

replace <sp_mul>(mul_a, mul_b, mul_r) by
	print @[mul_a, 12]
	print @[mul_a+12, 32]
	print @[mul_b, 12]
	print @[mul_b+12, 32]
	
	
        pushBN mul_a
        pushBN mul_b
        mulBN
        popBN mul_r
        
        
        print @[mul_r, 12]
        print @[mul_r+12, 32]

        return 0
end


