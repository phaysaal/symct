base_addr<32> := 0x1fff0000


replace <printf>(_) by
        return 1
end

replace <putchar>(_) by
        return 97
end

replace <fwrite>() by
	return 1
end

replace <malloc>(sz) by
        ret_val<32> := base_addr
        base_addr := base_addr + sz
        return ret_val
end

replace <free>(_) by
        return 0
end

replace <fprintf>(_) by
	return 1
end

