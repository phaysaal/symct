replace <br_i31_encode>(enc_dst, enc_len, enc_x) by
	print enc_len
	pushBN enc_x
	popBV encbvx<1056>
	enc_buf<32> := 0x2fff0000
	@[enc_buf, 132] := encbvx
	bit_len<32> := enc_len - 132
    	# Reverse bytes for big-endian output
    	for i<32> in 0 to enc_len - 1 do
        	byte_idx<32> := enc_len - 1 - i
        	@[enc_dst + i] := i < bit_len ? 0 : @[enc_buf+byte_idx]
    	end
    	
    	return 0
end
