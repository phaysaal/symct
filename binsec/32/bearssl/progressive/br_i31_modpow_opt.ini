replace <br_i31_modpow_opt>(pow_x, pow_e, pow_elen, pow_m, pow_m0i, pow_tmp, pow_twlen) by
        pushBN pow_m
	popBV bvm<1024>
				
        pushBN pow_x
	popBV bvx<1024>
				
	bve<64> := @[pow_e, 0x8]
	
	result<1024> := (bvm = 0) ? 0 : 1
	bvm := (bvm = 0) ? 1 : bvm
	for i<64> in 0 to 511 do
    	    result := ((result) * (result)) % bvm
    	    result := ((bve lsr (511  - i)) & 1) = 1 ? (((result) * (bvx)) % bvm) : result
	end

	resultt<1024> := uext1024 result
	pushBV resultt
	popBN pow_x
				
	return 1
end
