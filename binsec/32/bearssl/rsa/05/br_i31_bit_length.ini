replace <br_i31_bit_length>(bl_x, bl_xlen) by
	# Scan words from high to low to find top non-zero word (CT)
	tw<32> := 0
	twk<32> := 0
	for i<32> in 0 to 33 do
		idx<32> := 33 - i
		w<32> := idx < bl_xlen ? @[bl_x + idx * 4, 4] : 0
		c<32> := (tw = 0) ? 1 : 0
		tw := (c = 1) ? w : tw
		twk := (c = 1) ? idx : twk
	end
	# Compute BIT_LENGTH(tw) via binary search (CT)
	btln<32> := 0
	bv<32> := tw
	bv_p<32> := bv lsr 16
	btln := (bv_p = 0) ? btln : btln + 16
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 8
	btln := (bv_p = 0) ? btln : btln + 8
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 4
	btln := (bv_p = 0) ? btln : btln + 4
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 2
	btln := (bv_p = 0) ? btln : btln + 2
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 1
	btln := (bv_p = 0) ? btln : btln + 1
	# Add 1 for the remaining bit (BIT_LENGTH = floor(log2(x)) + 1)
	btln := (tw = 0) ? 0 : btln + 1
	return (twk lsl 5) + btln
end
