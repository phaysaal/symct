replace <br_i31_modpow>(mp_x, mp_e, mp_elen, mp_m, mp_m0i, mp_t1, mp_t2) by
	pushBN mp_x
	popBV mp_bvx<1056>
	pushBN mp_m
	popBV mp_bvm<1056>
	mp_bvm := mp_bvm | 0x1

	mp_buf<32> := 0x2fff0000
	for i<32> in 0 to 131 do
		byte_idx<32> := mp_elen - 1 - i
		@[mp_buf + i] := i < mp_elen ? @[mp_e + byte_idx] : 0
	end

	mp_exp<1056> := @[mp_buf, 132]

	# Square-and-multiply: x^e mod m (CT, processes MSB to LSB)
	rr<1056> := 1
	aa<1056> := mp_bvx % mp_bvm
	for j<32> in 0 to 1055 do
		i<32> := 1055 - j
		r2_wide<2112> := ((uext2112 rr) * (uext2112 rr)) % (uext2112 mp_bvm)
		r2<1056> := r2_wide{1055..0}
		r3_wide<2112> := ((uext2112 r2) * (uext2112 aa)) % (uext2112 mp_bvm)
		r3<1056> := r3_wide{1055..0}
		bit<1056> := (mp_exp lsr (uext1056 i)) & 0x1
		mask<1056> := 0 - bit
		rr := (r3 & mask) | (r2 & ~mask)
	end

	pushBV rr
	popBN mp_x
	return 0
end
