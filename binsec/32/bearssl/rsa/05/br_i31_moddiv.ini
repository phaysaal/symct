replace <br_i31_moddiv>(md_x, md_y, md_m, md_m0i, md_t) by
	pushBN md_x
	popBV md_bvx<1056>
	pushBN md_y
	popBV md_bvy<1056>
	pushBN md_m
	popBV md_bvm<1056>
	md_bvm_safe<1056> := md_bvm | 0x1

	# Compute y^(-1) mod m via Fermat's little theorem: y^(m-2) mod m
	# (valid since m is always odd prime in BearSSL RSA/EC usage)
	md_exp<1056> := md_bvm - 2
	rr<1056> := 1
	aa<1056> := md_bvy % md_bvm_safe
	for j<32> in 0 to 1055 do
		i<32> := 1055 - j
		r2_wide<2112> := ((uext2112 rr) * (uext2112 rr)) % (uext2112 md_bvm_safe)
		r2<1056> := r2_wide{1055..0}
		r3_wide<2112> := ((uext2112 r2) * (uext2112 aa)) % (uext2112 md_bvm_safe)
		r3<1056> := r3_wide{1055..0}
		bit<1056> := (md_exp lsr i) & 0x1
		mask<1056> := 0 - bit
		rr := (r3 & mask) | (r2 & ~mask)
	end

	# rr = y^(-1) mod m; compute x * y^(-1) mod m
	md_prod<2112> := (uext2112 md_bvx) * (uext2112 rr)
	md_result<1056> := (md_prod % (uext2112 md_bvm_safe)){1055..0}
	pushBV md_result
	popBN md_x

	# Return 1 if y is invertible (GCD(y,m) = 1)
	return 1
end
