replace <br_i31_from_monty>(fm_x, fm_m, fm_m0i) by
	pushBN fm_x
	popBV fm_bvx<1056>
	pushBN fm_m
	popBV fm_bvm<1056>
	# Convert from Montgomery form: x * R^-1 mod m
	# Iterative Montgomery reduction: len iterations of single-word reduction
	m_bitlen<32> := @[fm_m, 4]
	len<32> := (m_bitlen + 31) lsr 5
	for i32<32> in 0 to 33 do
		fff<64> := i32 < len ? ((uext64 fm_bvx{30..0}) * (uext64 fm_m0i)) & 0x7FFFFFFF : 0
		fm_bvx := i32 < len ? (fm_bvx + (uext1056 fff) * fm_bvm) lsr 31 : fm_bvx
	end
	# Final conditional subtraction if result >= m
	fm_bvx := fm_bvx >= fm_bvm ? fm_bvx - fm_bvm : fm_bvx
	pushBV fm_bvx
	popBN fm_x
	return 0
end
