replace <br_i31_decode_mod>(dm_x, dm_src, dm_len, dm_m) by
	# Reverse bytes (big-endian input to little-endian bitvector)
	dm_buf<32> := 0x2fff0000
	for i<32> in 0 to 131 do
		byte_idx<32> := dm_len - 1 - i
		@[dm_buf + i] := i < dm_len ? @[dm_src + byte_idx] : 0
	end
	dm_bvx<1056> := @[dm_buf, 132]

	pushBN dm_m
	popBV dm_bvm<1056>

	# Check if decoded value < modulus (CT comparison)
	fits<32> := dm_bvx < dm_bvm ? 1 : 0

	# Store value if it fits, zero otherwise
	dm_result<1056> := fits = 1 ? dm_bvx : 0
	pushBV dm_result
	popBN dm_x

	return fits
end
