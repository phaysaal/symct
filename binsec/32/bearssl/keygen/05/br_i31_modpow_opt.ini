replace <br_i31_modpow_opt>(mpo_x, mpo_e, mpo_elen, mpo_m, mpo_m0i, mpo_tmp, mpo_twlen) by
	# Check minimum tmp size: need at least 2 * mwlen words
	mpo_mwlen<32> := ((@[mpo_m, 4] + 63) lsr 5)
	mpo_mwlen := mpo_mwlen + (mpo_mwlen & 1)

	pushBN mpo_x
	popBV mpo_bvx<1056>
	pushBN mpo_m
	popBV mpo_bvm<1056>
	mpo_bvm := mpo_bvm | 0x1

	# Read exponent bytes (big-endian) into little-endian bitvector
	mpo_buf<32> := 0x2fff0000
	for i<32> in 0 to 131 do
		byte_idx<32> := mpo_elen - 1 - i
		@[mpo_buf + i] := i < mpo_elen ? @[mpo_e + byte_idx] : 0
	end
	mpo_exp<1056> := @[mpo_buf, 132]

	# Square-and-multiply: x^e mod m (CT, processes MSB to LSB)
	rr<1056> := 1
	aa<1056> := mpo_bvx % mpo_bvm
	for j<32> in 0 to 1055 do
		i<32> := 1055 - j
		r2_wide<2112> := ((uext2112 rr) * (uext2112 rr)) % (uext2112 mpo_bvm)
		r2<1056> := r2_wide{1055..0}
		r3_wide<2112> := ((uext2112 r2) * (uext2112 aa)) % (uext2112 mpo_bvm)
		r3<1056> := r3_wide{1055..0}
		bit<1056> := (mpo_exp lsr (uext1056 i)) & 0x1
		mask<1056> := 0 - bit
		rr := (r3 & mask) | (r2 & ~mask)
	end

	pushBV rr
	popBN mpo_x
	# Return 1 on success (0 if tmp too small)
	return mpo_twlen >= (mpo_mwlen lsl 1) ? 1 : 0
end
