replace <br_i31_to_monty>(tm_x, tm_m) by
	pushBN tm_x
	popBV tm_bvx<1056>
	pushBN tm_m
	popBV tm_bvm<1056>
	tm_bvm := tm_bvm | 0x1
	# Convert to Montgomery form: x * R mod m
	# R = 2^(31*len), computed as len iterations of x = (x << 31) mod m
	m_bitlen<32> := @[tm_m, 4]
	len<32> := (m_bitlen + 31) lsr 5
	for i<32> in 0 to 33 do
		tm_bvx := i < len ? (tm_bvx lsl 31) % tm_bvm : tm_bvx
	end
	pushBV tm_bvx
	popBN tm_x
	return 0
end
