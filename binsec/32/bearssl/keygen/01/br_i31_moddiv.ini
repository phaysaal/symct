# Modular Division: x = y / x (mod m) = y * x^(-1) (mod m)
# CONSTANT-TIME Binary Extended GCD Algorithm
#
# Invariants maintained:
#   a ≡ u * x (mod m)
#   b ≡ v * x (mod m)
# Starting: a = x, b = m, u = 1, v = 0
# After 2*bitlen iterations: gcd in a or b, inverse in u or v

replace <br_i31_moddiv>(moddiv_x, moddiv_y, moddiv_m, moddiv_m0i, moddiv_t) by
	# Convert inputs to bitvectors
	pushBN moddiv_x
	popBV md_x<1056>

	pushBN moddiv_y
	popBV md_y<1056>

	pushBN moddiv_m
	popBV md_m<1056>

	# Initialize: a = x, b = m, u = 1, v = 0
	md_a<1056> := md_x
	md_b<1056> := md_m
	md_u<1056> := 1
	md_v<1056> := 0

	# Fixed iterations: 2 * bit_length for constant-time
	for md_i<32> in 0 to 2111 do
		# Extract low bits (constant-time)
		md_a_odd<1> := md_a{0}
		md_b_odd<1> := md_b{0}

		# Compare a and b (constant-time)
		md_a_gt_b<1> := md_a > md_b ? 1 : 0
		md_a_lt_b<1> := md_a < md_b ? 1 : 0

		# Case flags (all constant-time, mutually exclusive)
		md_case_a_even<1> := ~md_a_odd
		md_case_b_even<1> := md_a_odd & ~md_b_odd
		md_case_sub_ab<1> := md_a_odd & md_b_odd & md_a_gt_b
		md_case_sub_ba<1> := md_a_odd & md_b_odd & ~md_a_gt_b

		# == Case 1: a is even → a = a/2, u = u/2 (mod m) ==
		# If u is odd, add m before dividing (to keep integer)
		md_u_adj1<1056> := md_u{0} = 1 ? (md_u + md_m) : md_u
		md_a1<1056> := md_a lsr 1
		md_u1<1056> := md_u_adj1 lsr 1

		# == Case 2: b is even → b = b/2, v = v/2 (mod m) ==
		md_v_adj2<1056> := md_v{0} = 1 ? (md_v + md_m) : md_v
		md_b2<1056> := md_b lsr 1
		md_v2<1056> := md_v_adj2 lsr 1

		# == Case 3: both odd, a > b → a = (a-b)/2, u = (u-v)/2 (mod m) ==
		md_a_sub_b<1056> := md_a - md_b
		md_u_sub_v<1056> := md_u >= md_v ? (md_u - md_v) : (md_u + md_m - md_v)
		md_u_adj3<1056> := md_u_sub_v{0} = 1 ? (md_u_sub_v + md_m) : md_u_sub_v
		md_a3<1056> := md_a_sub_b lsr 1
		md_u3<1056> := md_u_adj3 lsr 1

		# == Case 4: both odd, a <= b → b = (b-a)/2, v = (v-u)/2 (mod m) ==
		md_b_sub_a<1056> := md_b - md_a
		md_v_sub_u<1056> := md_v >= md_u ? (md_v - md_u) : (md_v + md_m - md_u)
		md_v_adj4<1056> := md_v_sub_u{0} = 1 ? (md_v_sub_u + md_m) : md_v_sub_u
		md_b4<1056> := md_b_sub_a lsr 1
		md_v4<1056> := md_v_adj4 lsr 1

		# == Constant-time select results ==
		# Update a
		md_a := md_case_a_even ? md_a1 : md_a
		md_a := md_case_sub_ab ? md_a3 : md_a

		# Update b
		md_b := md_case_b_even ? md_b2 : md_b
		md_b := md_case_sub_ba ? md_b4 : md_b

		# Update u
		md_u := md_case_a_even ? md_u1 : md_u
		md_u := md_case_sub_ab ? md_u3 : md_u

		# Update v
		md_v := md_case_b_even ? md_v2 : md_v
		md_v := md_case_sub_ba ? md_v4 : md_v
	end

	# After convergence: gcd is in whichever of a,b is nonzero
	# If a holds gcd=1, then u = x^(-1) mod m
	# If b holds gcd=1, then v = x^(-1) mod m
	# Select the right inverse (constant-time)
	md_inv<1056> := md_a = 1 ? md_u : md_v

	# Ensure result is in [0, m)
	md_inv := md_inv >= md_m ? (md_inv - md_m) : md_inv

	# Compute result = y * x^(-1) mod m
	md_prod<2112> := (uext2112 md_y) * (uext2112 md_inv)
	md_result<1056> := (md_prod % (uext2112 md_m)){1055..0}

	# Store result back to x
	pushBV md_result
	popBN moddiv_x

	# Return 1 if gcd = 1 (success), 0 otherwise
	md_gcd<1056> := md_a | md_b
	md_success<32> := md_gcd = 1 ? 1 : 0
	return md_success
end
