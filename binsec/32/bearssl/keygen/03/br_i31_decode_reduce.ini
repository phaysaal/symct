replace <br_i31_decode_reduce>(dr_x, dr_src, dr_len, dr_m) by
        # Read source bytes (big-endian) and reverse to little-endian
    	dr_buf<32> := 0x2fff0000
        
        # Reverse bytes: big-endian input → little-endian for bitvector
    	for i<32> in 0 to 131 do
		byte_idx<32> := dr_len - 1 - i
		byte_val<8> := (i < dr_len) ? @[dr_src + byte_idx] : 0
		@[dr_buf + i] := byte_val
    	end
        
    	# Read reversed bytes as bitvector
    	drbv_src<1056> := @[dr_buf, 132]
           
    	# Read modulus (already in br_i31 format)
    	pushBN dr_m
    	popBV dr_bvm<1056>
        print drbv_src
        print dr_bvm
        
    	# Compute: result = decode(src) mod m
    	dr_bvm := dr_bvm | 0x1
    	result<1056> := drbv_src % dr_bvm # dr_bvm = 0 ? 0 : drbv_src % dr_bvm
    	
    	# Store result in br_i31 format
    	pushBV result
    	popBN dr_x
    
	##pushBV drbv_src
	##popBV drbv_src_bv<1024>
	##print drbv_src_bv
	
	#print @[dr_m, 136]
