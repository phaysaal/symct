	#popBV dr_bvm<1024>
	#print dr_bvm
	
	#dr_res<1024> := dr_bvm <= 0 ? drbv_src % dr_bvm : -1
	
	##dr_bvm := dr_bvm = 0 ? 1 : dr_bvm
	##print dr_bvm
	##assume dr_bvm <> 0
