replace <mbedtls_mpi_cmp_mpi>(cmp_X, cmp_Y) by
	# Compare X and Y
	# Returns: -1 if X < Y, 0 if X == Y, 1 if X > Y
	# X, Y are mbedtls_mpi structure pointers

	print cmp_X
	print @[@[cmp_X,4], 256]
	print @[cmp_X+4,2]
	print @[cmp_X+6,2]
	
	print cmp_Y
	print @[@[cmp_Y,4], 256]
	print @[cmp_Y+4,2]
	print @[cmp_Y+6,2]
	
	pushBN cmp_X
	popBV cmp_X_bv<2048>
	print cmp_X_bv

	pushBN cmp_Y
	popBV cmp_Y_bv<2048>
	print cmp_Y_bv

	# Signed comparison
	cmp_result<32> := cmp_X_bv < cmp_Y_bv ? -1 : (cmp_X_bv = cmp_Y_bv ? 0 : 1)
	print cmp_result

	return cmp_result
end
