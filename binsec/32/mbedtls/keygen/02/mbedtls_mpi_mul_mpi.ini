replace <mbedtls_mpi_mul_mpi>(mul_X, mul_A, mul_B) by
	# X = A * B
	# X, A, B are mbedtls_mpi structure pointers

	print mul_A
	print mul_B

	pushBN mul_A
	popBV mul_A_bv<2048>

	pushBN mul_B
	popBV mul_B_bv<2048>

	# Perform multiplication with extended size to avoid overflow
	mul_A_ext<4096> := uext4096 mul_A_bv
	mul_B_ext<4096> := uext4096 mul_B_bv
	mul_result<4096> := mul_A_ext * mul_B_ext

	# Truncate back to 2048 bits
	mul_X_bv<2048> := mul_result{2047..0}

	pushBV mul_X_bv
	popBN mul_X

	print mul_X

	return 0
end
