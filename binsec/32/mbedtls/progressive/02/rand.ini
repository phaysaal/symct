replace <mbedtls_mpi_random>(rnd_X, rnd_min, rnd_N, _, _) by
	rnd_Xp<32> := @[rnd_X, 4]
	rnd_Np<32> := @[rnd_N, 4]
	rnd_limbs<16> := @[rnd_X+6, 2]
	
	@[rnd_Xp, 32] := nondet as rnd_rnd
	@[rnd_Xp, 32] := @[rnd_Xp, 32] % (@[rnd_Np, 32] - uext256 rnd_min)
	@[rnd_Xp, 32] := @[rnd_Xp, 32] + uext256 rnd_min
	
	return 0
end
