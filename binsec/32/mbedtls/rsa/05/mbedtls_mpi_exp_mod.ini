replace <mbedtls_mpi_exp_mod>(em_X, em_A, em_E, em_N, em_prec_RR) by
	# X = A^E mod N
	pushBN em_A
	popBV em_A_bv<2048>
	pushBN em_E
	popBV em_E_bv<2048>
	pushBN em_N
	popBV em_N_bv<2048>
	em_N_bv := em_N_bv = 0 ? 1 : em_N_bv

	# Square-and-multiply from LSB to MSB
	em_result<4096> := 1
	em_base<4096> := (uext4096 em_A_bv) % (uext4096 em_N_bv)
	em_N_ext<4096> := uext4096 em_N_bv

	for i4096<4096> in 0 to 2047 do
		em_bit<4096> := ((uext4096 em_E_bv) lsr (uext4096 i4096)) & 0x1
		em_temp<4096> := (em_result * em_base) % em_N_ext
		em_mask<4096> := -em_bit
		em_not_mask<4096> := em_bit - 0x1
		em_result := (em_mask & em_temp) | (em_not_mask & em_result)
		em_base := (em_base * em_base) % em_N_ext
	end

	em_X_bv<2048> := em_result{2047..0}
	pushBV em_X_bv
	popBN em_X
	@[em_X+4, 2] := 1
	return 0
end
