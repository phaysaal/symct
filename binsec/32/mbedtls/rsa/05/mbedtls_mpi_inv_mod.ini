replace <mbedtls_mpi_inv_mod>(iv_X, iv_A, iv_N) by
	# X = A^(-1) mod N via Fermat's little theorem: A^(N-2) mod N
	pushBN iv_A
	popBV iv_A_bv<2048>
	pushBN iv_N
	popBV iv_N_bv<2048>
	iv_N_bv := iv_N_bv = 0 ? 1 : iv_N_bv

	iv_exp<4096> := (uext4096 iv_N_bv) - 2
	iv_result<4096> := 1
	iv_base<4096> := (uext4096 iv_A_bv) % (uext4096 iv_N_bv)
	iv_N_ext<4096> := uext4096 iv_N_bv

	for i4096<4096> in 0 to 2047 do
		iv_bit<4096> := (iv_exp lsr i4096) & 0x1
		iv_temp<4096> := (iv_result * iv_base) % iv_N_ext
		iv_mask<4096> := -iv_bit
		iv_not_mask<4096> := iv_bit - 0x1
		iv_result := (iv_mask & iv_temp) | (iv_not_mask & iv_result)
		iv_base := (iv_base * iv_base) % iv_N_ext
	end

	iv_X_bv<2048> := iv_result{2047..0}
	pushBV iv_X_bv
	popBN iv_X
	@[iv_X+4, 2] := 1
	return 0
end
