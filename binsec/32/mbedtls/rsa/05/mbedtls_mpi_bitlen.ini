replace <mbedtls_mpi_bitlen>(bl_X) by
	# Returns number of bits (position of MSB + 1)
	pushBN bl_X
	popBV bl_bv<2048>
	btln<32> := 0
	bv<2048> := bl_bv
	bv_p<2048> := bv lsr 1024
	btln := (bv_p = 0) ? btln : btln + 1024
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 512
	btln := (bv_p = 0) ? btln : btln + 512
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 256
	btln := (bv_p = 0) ? btln : btln + 256
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 128
	btln := (bv_p = 0) ? btln : btln + 128
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 64
	btln := (bv_p = 0) ? btln : btln + 64
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 32
	btln := (bv_p = 0) ? btln : btln + 32
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 16
	btln := (bv_p = 0) ? btln : btln + 16
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 8
	btln := (bv_p = 0) ? btln : btln + 8
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 4
	btln := (bv_p = 0) ? btln : btln + 4
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 2
	btln := (bv_p = 0) ? btln : btln + 2
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 1
	btln := (bv_p = 0) ? btln : btln + 1
	btln := (bl_bv = 0) ? 0 : btln + 1
	return btln
end

replace <mbedtls_mpi_size>(sz_X) by
	# Returns number of bytes: (bitlen + 7) / 8
	pushBN sz_X
	popBV sz_bv<2048>
	btln<32> := 0
	bv<2048> := sz_bv
	bv_p<2048> := bv lsr 1024
	btln := (bv_p = 0) ? btln : btln + 1024
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 512
	btln := (bv_p = 0) ? btln : btln + 512
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 256
	btln := (bv_p = 0) ? btln : btln + 256
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 128
	btln := (bv_p = 0) ? btln : btln + 128
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 64
	btln := (bv_p = 0) ? btln : btln + 64
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 32
	btln := (bv_p = 0) ? btln : btln + 32
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 16
	btln := (bv_p = 0) ? btln : btln + 16
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 8
	btln := (bv_p = 0) ? btln : btln + 8
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 4
	btln := (bv_p = 0) ? btln : btln + 4
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 2
	btln := (bv_p = 0) ? btln : btln + 2
	bv := (bv_p = 0) ? bv : bv_p
	bv_p := bv lsr 1
	btln := (bv_p = 0) ? btln : btln + 1
	btln := (sz_bv = 0) ? 0 : btln + 1
	return (btln + 7) lsr 3
end

replace <mbedtls_mpi_lsb>(lsb_X) by
	# Returns position of least significant set bit
	pushBN lsb_X
	popBV lsb_bv<2048>
	cnt<32> := 0
	bv<2048> := lsb_bv
	t<2048> := bv & 0xFFFFFFFF
	cnt := (bv <> 0 && t = 0) ? cnt + 32 : cnt
	bv := (bv <> 0 && t = 0) ? bv lsr 32 : bv
	t := bv & 0xFFFF
	cnt := (bv <> 0 && t = 0) ? cnt + 16 : cnt
	bv := (bv <> 0 && t = 0) ? bv lsr 16 : bv
	t := bv & 0xFF
	cnt := (bv <> 0 && t = 0) ? cnt + 8 : cnt
	bv := (bv <> 0 && t = 0) ? bv lsr 8 : bv
	t := bv & 0xF
	cnt := (bv <> 0 && t = 0) ? cnt + 4 : cnt
	bv := (bv <> 0 && t = 0) ? bv lsr 4 : bv
	t := bv & 0x3
	cnt := (bv <> 0 && t = 0) ? cnt + 2 : cnt
	bv := (bv <> 0 && t = 0) ? bv lsr 2 : bv
	t := bv & 0x1
	cnt := (bv <> 0 && t = 0) ? cnt + 1 : cnt
	return lsb_bv = 0 ? 0 : cnt
end
