replace <mbedtls_mpi_safe_cond_assign>(sca_X, sca_Y, sca_assign) by
	# If assign=1: X = Y; else: no-op (constant-time)
	pushBN sca_X
	popBV sca_X_bv<2048>
	pushBN sca_Y
	popBV sca_Y_bv<2048>
	sca_mask<2048> := 0 - (uext2048 (sca_assign & 1))
	sca_diff<2048> := sca_X_bv ^ sca_Y_bv
	sca_result<2048> := sca_X_bv ^ (sca_diff & sca_mask)
	pushBV sca_result
	popBN sca_X
	# Also swap sign if assigning
	sca_sx<16> := @[sca_X+4, 2]
	sca_sy<16> := @[sca_Y+4, 2]
	@[sca_X+4, 2] := (sca_assign & 1) = 1 ? sca_sy : sca_sx
	return 0
end

replace <mbedtls_mpi_safe_cond_swap>(scs_X, scs_Y, scs_swap) by
	# If swap=1: swap X and Y; else: no-op (constant-time)
	pushBN scs_X
	popBV scs_X_bv<2048>
	pushBN scs_Y
	popBV scs_Y_bv<2048>
	scs_mask<2048> := 0 - (uext2048 (scs_swap & 1))
	scs_diff<2048> := scs_X_bv ^ scs_Y_bv
	scs_masked<2048> := scs_diff & scs_mask
	scs_new_X<2048> := scs_X_bv ^ scs_masked
	scs_new_Y<2048> := scs_Y_bv ^ scs_masked
	pushBV scs_new_X
	popBN scs_X
	pushBV scs_new_Y
	popBN scs_Y
	# Swap signs
	scs_sx<16> := @[scs_X+4, 2]
	scs_sy<16> := @[scs_Y+4, 2]
	@[scs_X+4, 2] := (scs_swap & 1) = 1 ? scs_sy : scs_sx
	@[scs_Y+4, 2] := (scs_swap & 1) = 1 ? scs_sx : scs_sy
	return 0
end
