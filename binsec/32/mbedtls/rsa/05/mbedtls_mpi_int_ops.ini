replace <mbedtls_mpi_add_int>(ai_X, ai_A, ai_b) by
	# X = A + b (b is mbedtls_mpi_sint = int32_t)
	pushBN ai_A
	popBV ai_A_bv<2048>
	ai_b_abs<2048> := ai_b < 0 ? uext2048 (0 - ai_b) : uext2048 ai_b
	ai_result<2048> := ai_b < 0 ? ai_A_bv - ai_b_abs : ai_A_bv + ai_b_abs
	pushBV ai_result
	popBN ai_X
	return 0
end

replace <mbedtls_mpi_sub_int>(si_X, si_A, si_b) by
	# X = A - b (b is mbedtls_mpi_sint = int32_t)
	pushBN si_A
	popBV si_A_bv<2048>
	si_b_abs<2048> := si_b < 0 ? uext2048 (0 - si_b) : uext2048 si_b
	si_result<2048> := si_b < 0 ? si_A_bv + si_b_abs : si_A_bv - si_b_abs
	pushBV si_result
	popBN si_X
	return 0
end

replace <mbedtls_mpi_mul_int>(mi_X, mi_A, mi_b) by
	# X = A * b (b is mbedtls_mpi_uint = uint32_t)
	pushBN mi_A
	popBV mi_A_bv<2048>
	mi_b_ext<4096> := uext4096 mi_b
	mi_A_ext<4096> := uext4096 mi_A_bv
	mi_result<4096> := mi_A_ext * mi_b_ext
	mi_X_bv<2048> := mi_result{2047..0}
	pushBV mi_X_bv
	popBN mi_X
	return 0
end

replace <mbedtls_mpi_div_int>(di_Q, di_R, di_A, di_b) by
	# Q = A / b, R = A % b (b is mbedtls_mpi_sint = int32_t)
	pushBN di_A
	popBV di_A_bv<2048>
	di_b_bv<2048> := uext2048 (di_b < 0 ? (0 - di_b) : di_b)
	di_b_bv := di_b_bv = 0 ? 1 : di_b_bv
	if di_Q <> 0 then
		di_Q_bv<2048> := di_A_bv / di_b_bv
		pushBV di_Q_bv
		popBN di_Q
	end
	if di_R <> 0 then
		di_R_bv<2048> := di_A_bv % di_b_bv
		pushBV di_R_bv
		popBN di_R
	end
	return 0
end

replace <mbedtls_mpi_mod_int>(modi_r, modi_A, modi_b) by
	# *r = A mod b (b is mbedtls_mpi_sint, r is pointer to mbedtls_mpi_uint)
	pushBN modi_A
	popBV modi_A_bv<2048>
	modi_b_bv<2048> := uext2048 (modi_b < 0 ? (0 - modi_b) : modi_b)
	modi_b_bv := modi_b_bv = 0 ? 1 : modi_b_bv
	modi_result<2048> := modi_A_bv % modi_b_bv
	@[modi_r, 4] := modi_result{31..0}
	return 0
end
