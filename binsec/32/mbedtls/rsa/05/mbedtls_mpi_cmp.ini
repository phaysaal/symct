replace <mbedtls_mpi_cmp_abs>(ca_X, ca_Y) by
	# Compare |X| and |Y|
	pushBN ca_X
	popBV ca_X_bv<2048>
	pushBN ca_Y
	popBV ca_Y_bv<2048>
	result<32> := ca_X_bv = ca_Y_bv ? 0 : (ca_X_bv > ca_Y_bv ? 1 : -1)
	return result
end

replace <mbedtls_mpi_cmp_int>(ci_X, ci_z) by
	# Compare X with integer z
	pushBN ci_X
	popBV ci_X_bv<2048>
	ci_X_sign<32> := sext32 @[ci_X+4, 2]
	# Get |z| and sign of z
	ci_z_neg<32> := ci_z < 0 ? 1 : 0
	ci_z_abs<2048> := uext2048 (ci_z_neg = 1 ? (0 - ci_z) : ci_z)
	# Compare signs first, then magnitudes
	ci_X_neg<32> := ci_X_sign = -1 ? 1 : 0
	# Both positive
	ci_mag<32> := ci_X_bv = ci_z_abs ? 0 : (ci_X_bv > ci_z_abs ? 1 : -1)
	result<32> := ci_X_neg <> ci_z_neg ? (ci_X_neg = 1 ? -1 : 1) : (ci_X_neg = 1 ? (0 - ci_mag) : ci_mag)
	return result
end

replace <mbedtls_mpi_lt_mpi_ct>(lt_X, lt_Y, lt_ret) by
	# Constant-time: *ret = 1 if X < Y, 0 otherwise
	pushBN lt_X
	popBV lt_X_bv<2048>
	pushBN lt_Y
	popBV lt_Y_bv<2048>
	lt_result<32> := lt_X_bv < lt_Y_bv ? 1 : 0
	@[lt_ret, 4] := lt_result
	return 0
end
