replace <mbedtls_mpi_read_binary>(rb_X, rb_buf, rb_buflen) by
	# Read big-endian bytes into MPI
	rb_tmp<32> := 0x6f000000
	for i<32> in 0 to 255 do
		rb_idx<32> := rb_buflen - 1 - i
		@[rb_tmp + i] := i < rb_buflen ? @[rb_buf + rb_idx] : 0
	end
	rb_bv<2048> := @[rb_tmp, 256]
	pushBV rb_bv
	popBN rb_X
	@[rb_X+4, 2] := 1
	return 0
end

replace <mbedtls_mpi_write_binary>(wb_X, wb_buf, wb_buflen) by
	# Write MPI as big-endian bytes
	pushBN wb_X
	popBV wb_bv<2048>
	wb_tmp<32> := 0x6f100000
	@[wb_tmp, 256] := wb_bv
	# Reverse: little-endian bitvector to big-endian output
	for i<32> in 0 to 255 do
		wb_src_idx<32> := wb_buflen - 1 - i
		@[wb_buf + i] := i < wb_buflen ? @[wb_tmp + wb_src_idx] : 0
	end
	return 0
end

replace <mbedtls_mpi_read_binary_le>(rbl_X, rbl_buf, rbl_buflen) by
	# Read little-endian bytes into MPI
	rbl_tmp<32> := 0x6f200000
	for i<32> in 0 to 255 do
		@[rbl_tmp + i] := i < rbl_buflen ? @[rbl_buf + i] : 0
	end
	rbl_bv<2048> := @[rbl_tmp, 256]
	pushBV rbl_bv
	popBN rbl_X
	@[rbl_X+4, 2] := 1
	return 0
end

replace <mbedtls_mpi_write_binary_le>(wbl_X, wbl_buf, wbl_buflen) by
	# Write MPI as little-endian bytes
	pushBN wbl_X
	popBV wbl_bv<2048>
	wbl_tmp<32> := 0x6f300000
	@[wbl_tmp, 256] := wbl_bv
	for i<32> in 0 to 255 do
		@[wbl_buf + i] := i < wbl_buflen ? @[wbl_tmp + i] : 0
	end
	return 0
end
