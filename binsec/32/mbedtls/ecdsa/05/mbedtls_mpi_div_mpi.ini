replace <mbedtls_mpi_div_mpi>(div_Q, div_R, div_A, div_B) by
	# Q = A / B (quotient)
	# R = A % B (remainder)
	# Q, R, A, B are mbedtls_mpi structure pointers

	pushBN div_A
	popBV bv_A<2048>

	pushBN div_B
	popBV bv_B<2048>

	# Division operation
	if div_Q <> 0 then
		call_macro mk_safe(div_Q)
		bv_Q<2048> := bv_B = 0 ? 0 : bv_A / bv_B
		pushBV bv_Q
		popBN div_Q
	end

	# Remainder operation
	if div_R <> 0 then
		call_macro mk_safe(div_R)
		bv_R<2048> := bv_B = 0 ? 0 : bv_A % bv_B
		pushBV bv_R
		popBN div_R
	end

	return 0
end
